<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Section</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.hero{
    height:100vh;
    background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1400") center center/cover no-repeat;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.45);
}

.hero-content{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    align-items:center;
}

.hero h1{
    font-size:4rem;
    font-weight:bold;
    color:#fff;
    line-height:1.2;
}

.hero p{
    color:#b9afaf;
    font-size:1.2rem;
    margin:20px 0;
}

.btn-custom{
    background:#e2dcdc;
    color:#000;
    padding:12px 30px;
    border-radius:50px;
    font-weight:600;
    margin-right:15px;
}

.btn-custom:hover{
    background:#000;
    color:#fff;
}

.btn-outline-light{
    border-radius:50px;
    padding:12px 30px;
}
</style>

</head>
<body>

<section class="hero">
<div class="container hero-content">

<div class="col-lg-7">

<h1>
Journey Beyond Earth<br>
Into the Cosmos
</h1>

<p>
Discover breathtaking galaxies, stars and planets with an unforgettable adventure beyond Earth.
</p>

<a href="#" class="btn btn-custom">Book Now</a>

<a href="#" class="btn btn-outline-light">Learn More</a>

</div>

</div>
</section>

</body>
</html>
